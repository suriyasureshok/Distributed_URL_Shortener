version: '3.8'

services:

  api1:
    build: ./api_service
    ports:
      - "8000:8000"
    env_file:
      - ./api_service/.env
    depends_on:
      - redis0
      - redis1
      - redis2
      - db0
      - db1
      - db2

  api2:
    build: ./api_service
    ports:
      - "8001:8000"
    env_file:
      - ./api_service/.env
    depends_on:
      - redis0
      - redis1
      - redis2
      - db0
      - db1
      - db2

  api3:
    build: ./api_service
    ports:
      - "8002:8000"
    env_file:
      - ./api_service/.env
    depends_on:
      - redis0
      - redis1
      - redis2
      - db0
      - db1
      - db2

  redis0:
    image: redis:latest
    ports:
      - "6379:6379"

  redis1:
    image: redis:latest
    ports:
      - "6380:6379"

  redis2:
    image: redis:latest
    ports:
      - "6381:6379"

  db0:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Suriya@1312
      POSTGRES_DB: shortener_db
    ports:
      - "5433:5432"

  db1:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Suriya@1312
      POSTGRES_DB: shortener_db
    ports:
      - "5434:5432"

  db2:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Suriya@1312
      POSTGRES_DB: shortener_db
    ports:
      - "5435:5432"

  haproxy:
    image: haproxy:latest
    ports:
      - "8080:8080"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - api1
      - api2
      - api3
